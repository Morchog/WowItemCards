<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap" rel="stylesheet">

    <script>
        var whTooltips = {
            expansion: "wotlk",
            iconizeLinks: true,
            renameLinks: true,
            colorLinks: true
        };
    </script>

    <script src="https://wow.zamimg.com/widgets/power.js"></script>

    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* 🃏 CARD */
        .card {
            border-radius: 14px;
            background: linear-gradient(145deg, #1e293b, #0b1220);

            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;

            text-decoration: none;
            cursor: default;
            transition: all 0.15s ease;
            border: 2px solid transparent;
        }

        /* ICON */
        .card .iconlarge {
            margin-bottom: 10px !important;

            width: 60px !important;
            height: 60px !important;

            display: block !important;
            margin: 0 auto 10px auto !important;
            padding: 0 !important;
            position: relative;
        }

        /* ensure proper layering */
        .card .iconlarge ins {
            position: absolute;
            top: 50%;
            left: 50%;

            width: 88% !important;
            height: 88% !important;

            transform: translate(-50%, -50%);
            background-size: cover !important;
        }

        .card .iconlarge del {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            background-size: 100% 100% !important;
        }

        .card .iconlarge img {
            width: 100% !important;
            height: 100% !important;
            border-radius: 12px;
            transition: 0.3s;
        }

        /* 📝 ITEM NAME */
        .card span:last-child {
            text-align: center;
            font-size: 12px;
            font-weight: 300;
            line-height: 1.25;
            word-break: break-word;
            padding: 0 6px;
        }

        /* ✨ BASE GLOW (subtle, always visible) */
        .card.q1 {
            border-color: #aaaaaa;
            box-shadow: 0 0 1px #d6d6d6;
        }

        .card.q2 {
            border-color: #1eff00;
            box-shadow: 0 0 3px #1eff00;
        }

        .card.q3 {
            border-color: #0070dd;
            box-shadow: 0 0 15px #0070dd;
        }

        .card.q4 {
            border-color: #a335ee;
            box-shadow: 0 0 35px #a335ee;
        }

        .card.q5 {
            border-color: #ff8000;
            box-shadow: 0 0 48px #ff8000;
            animation: legendaryGlow 2s infinite;
        }

        /* 🔥 LEGENDARY PULSE ANIMATION */
        @keyframes legendaryGlow {
            0% {
                box-shadow: 0 0 48px #ff8000;
            }

            50% {
                box-shadow: 0 0 80px #ff8000;
            }

            100% {
                box-shadow: 0 0 48px #ff8000;
            }
        }

        .card.q7 {
            border-color: #00c3ff;
            box-shadow: 0 0 35px #00c3ff;
        }

        /* 💥 STRONGER HOVER GLOW */
        .card.q2:hover {
            box-shadow: 0 0 15px #1eff00;
        }

        .card.q3:hover {
            box-shadow: 0 0 25px #0070dd;
        }

        .card.q4:hover {
            box-shadow: 0 0 55px #a335ee;
        }

        .card.q5:hover {
            box-shadow: 0 0 70px #ff8000;
        }

        .card.q7:hover {
            box-shadow: 0 0 55px #00c3ff;
        }

        /* 🃏 WRAPPER (3D space) */
        .card-wrapper {
            perspective: 1200px;
            display: inline-block;
            position: relative;
            --tx: 0px;
            --ty: 0px;
            --scale: 1;

            transform: translate(var(--tx), var(--ty)) scale(var(--scale));
            transition: transform 0.7s cubic-bezier(.2, .8, .2, 1), opacity 0.4s;
            will-change: transform;
        }

        /* INNER ROTATING ELEMENT */
        .card-inner {
            width: 120px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
            transform-style: preserve-3d;
            transition: transform 0.2s ease;
        }

        /* FLIPPED STATE */
        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* FRONT + BACK shared */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        /* BACK SIDE */
        .card.back {
            transform: rotateY(180deg);

            display: flex;
            align-items: center;
            justify-content: center;

            position: relative;

            background-image: url("https://wow.zamimg.com/images/wow/talents/backgrounds/wrath/164.jpg");
            background-size: 145%;
            background-position: center;
            background-repeat: no-repeat;

            border-radius: 14px;
            overflow: hidden;
        }

        .card.back:hover {
            border-color: #ffffff;
        }

        /* Top image (the one you want rounded/cropped) */
        .logo {
            width: 60px;
            height: 60px;

            background-image: url("https://wow.zamimg.com/images/wow/icons/large/wow_token01.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* mix-blend-mode: lighten; */
            filter: contrast(1.2) brightness(0.95);
            opacity: 0.65;
            border-radius: 30px;
            overflow: hidden;
        }

        /* ❌ remove glow when flipped */
        .card-wrapper.flipped .front {
            box-shadow: none !important;
            border-color: transparent !important;
            animation: none !important;
        }

        /* ❌ remove foil when flipped */
        .card-wrapper.flipped .card::before,
        .card-wrapper.flipped .card::after {
            opacity: 0 !important;
        }

        /* ✨ HOLOGRAPHIC FOIL LAYER */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;

            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%),
                    rgba(255, 255, 255, 0.25),
                    rgba(255, 255, 255, 0.05) 30%,
                    transparent 60%);

            opacity: 0.6;
            mix-blend-mode: overlay;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        /* 🌈 RAINBOW SHIMMER */
        .card::after {
            content: "";
            position: absolute;

            /* 🔥 make it bigger than the card */
            width: 200%;
            height: 100%;
            left: -50%;
            top: 0;

            border-radius: 14px;

            mix-blend-mode: screen;
            pointer-events: none;

            animation: holoMove 6s ease-in-out infinite alternate;
        }

        @keyframes holoMove {
            from {
                transform: translateX(-25%);
            }

            to {
                transform: translateX(25%);
            }
        }

        .card.q2::after {
            background: linear-gradient(120deg,
                    rgba(30, 255, 0, 0.15) 0%,
                    rgba(80, 255, 120, 0.25) 40%,
                    rgba(180, 255, 200, 0.35) 50%,
                    rgba(80, 255, 120, 0.25) 60%,
                    rgba(30, 255, 0, 0.15) 100%);

            opacity: 0.35;
        }

        .card.q3::after {
            background: linear-gradient(120deg,
                    rgba(0, 112, 221, 0.2) 0%,
                    rgba(0, 180, 255, 0.3) 40%,
                    rgba(120, 220, 255, 0.4) 50%,
                    rgba(0, 180, 255, 0.3) 60%,
                    rgba(0, 112, 221, 0.2) 100%);

            opacity: 0.35;
        }

        .card.q4::after {
            background: linear-gradient(120deg,
                    rgba(163, 53, 238, 0.25) 0%,
                    rgba(200, 120, 255, 0.35) 40%,

                    rgba(255, 200, 255, 0.5) 50%,

                    rgba(200, 120, 255, 0.35) 60%,
                    rgba(163, 53, 238, 0.25) 100%);

            opacity: 0.35;
        }

        .card.q5::after {
            background: linear-gradient(120deg,
                    rgba(255, 120, 0, 0.4) 0%,
                    rgba(255, 200, 0, 0.5) 40%,

                    rgba(255, 255, 255, 0.6) 50%,

                    rgba(255, 200, 0, 0.5) 60%,
                    rgba(255, 120, 0, 0.4) 100%);

            opacity: 0.35;
        }

        .card.q7::after {
            background: linear-gradient(120deg,
                    rgba(56, 53, 238, 0.25) 0%,
                    rgba(30, 255, 116, 0.35) 40%,

                    rgba(199, 244, 255, 0.5) 50%,

                    rgba(30, 255, 116, 0.35) 60%,
                    rgba(56, 53, 238, 0.25) 100%);

            opacity: 0.35;
        }

        .wowhead-tooltip {
            position: fixed !important;
            left: var(--tooltip-x) !important;
            top: var(--tooltip-y) !important;
            transform: translateY(-50%) !important;
            pointer-events: none !important;
            transition: none !important;
            will-change: transform;
        }

        .wowhead-tooltip .icon,
        .wowhead-tooltip .iconsmall,
        .wowhead-tooltip .iconmedium,
        .wowhead-tooltip .iconlarge {
            display: none !important;
        }

        .tooltip-anchor {
            display: block;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: default;
        }

        .hover-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        .hover-layer-flipped {
            display: none;
        }

        .container {
            width: 100%;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .columns {
            display: flex;
            gap: 15px;
            /* space between columns */
            align-items: center;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* vertical spacing */
        }

        .center {
            margin-top: 60px;
            /* lifts it to align hex shape */
        }

        .left {
            margin-top: 60px;
        }

        .right {
            margin-top: 60px;
        }

        /* PREFLIP EFFECTS */
        /* PREFLIP EFFECTS */
        /* PREFLIP EFFECTS */
        /* 🎯 BASE PRE-ANIMATION (shared) */
        /* 🎯 BASE LIFT */
        .card-wrapper[class*="pre-"] {
            transform: translateY(-10px);
            transition: transform 0.2s ease;
        }

        /* 💜 EPIC + 💎 HEIRLOOM (same animation, closer to legendary) */
        .card-wrapper.pre-epic .card-anim,
        .card-wrapper.pre-heirloom .card-anim {
            animation: mediumShake 0.55s infinite;
        }

        @keyframes mediumShake {
            0% {
                transform: scale(1.04) rotateZ(-2deg);
            }

            25% {
                transform: scale(1.07) rotateZ(2deg);
            }

            50% {
                transform: scale(1.09) rotateZ(-2deg);
            }

            75% {
                transform: scale(1.07) rotateZ(2deg);
            }

            100% {
                transform: scale(1.04) rotateZ(0deg);
            }
        }


        /* 🔥 LEGENDARY (reduced intensity, still strongest) */
        .card-wrapper.pre-legendary .card-anim {
            animation: legendaryShake 0.4s infinite;
        }

        @keyframes legendaryShake {
            0% {
                transform: scale(1.06) rotateZ(-2.5deg);
            }

            25% {
                transform: scale(1.1) rotateZ(2.5deg);
            }

            50% {
                transform: scale(1.12) rotateZ(-2.5deg);
            }

            75% {
                transform: scale(1.1) rotateZ(2.5deg);
            }

            100% {
                transform: scale(1.06) rotateZ(0deg);
            }
        }

        .card-anim {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* 🂠 START STACK (deck in center) */
        .deck-start .card-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
        }

        /* 🎴 DEAL ANIMATION */
        .card-wrapper.deal {
            transition:
                transform 0.6s cubic-bezier(.2, .8, .2, 1),
                opacity 0.4s ease;
            opacity: 1;
        }

        /* CHEST */
        .deck-start .card-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            opacity: 0;
        }

        .chest {
            position: absolute;
            width: 100px;
            height: 100px;

            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

            background-image: url("https://wow.zamimg.com/images/wow/icons/large/inv_misc_treasurechest01a.jpg");
            background-size: cover;
            background-position: center;

            border-radius: 16px;
            cursor: pointer;

            z-index: 50;

            box-shadow: 0 0 30px rgba(255, 180, 0, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .chest:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* SIDEBAR */
        /* SIDEBAR */
        /* SIDEBAR */
        /* 📦 SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;

            background: linear-gradient(160deg, #020617, #0f172a);
            border-right: 1px solid rgba(255, 255, 255, 0.05);

            padding: 20px 10px;
            box-shadow: 5px 0 25px rgba(0, 0, 0, 0.6);

            display: flex;
            flex-direction: column;
            gap: 10px;

            z-index: 100;
        }

        /* MAIN BUTTONS */
        .menu-item {
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;

            background: rgba(255, 255, 255, 0.03);
            color: #cbd5f5;
            font-size: 14px;
            font-weight: 500;

            transition: all 0.2s ease;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        /* SUBMENU */
        .submenu {
            display: flex;
            flex-direction: column;
            gap: 6px;

            max-height: 0;
            overflow: hidden;

            transition: max-height 0.3s ease;
            padding-left: 10px;
        }

        /* OPEN STATE */
        .submenu.open {
            max-height: 200px;
        }

        /* SUB ITEMS */
        .submenu-item {
            padding: 8px 12px;
            border-radius: 8px;

            font-size: 13px;
            color: #94a3b8;

            cursor: pointer;
            transition: 0.2s;
        }

        .submenu-item:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
        }

        /* CURRENCY PANEL */
        /* CURRENCY PANEL */
        /* CURRENCY PANEL */
        /* 💰 CURRENCY PANEL */
        .currency-panel {
            position: fixed;
            top: 12px;
            left: 240px;
            /* aligns after sidebar */

            display: flex;
            gap: 10px;

            padding: 8px 12px;
            border-radius: 12px;

            background: linear-gradient(145deg, #020617, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);

            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
            z-index: 200;
        }

        /* EACH CURRENCY */
        .currency {
            display: flex;
            align-items: center;
            gap: 6px;

            padding: 6px 10px;
            border-radius: 8px;

            background: rgba(255, 255, 255, 0.03);
            text-decoration: none;

            transition: 0.2s;
        }

        .currency:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* VALUE TEXT */
        .currency .value {
            font-size: 13px;
            color: #e2e8f0;
            font-weight: 500;
        }

        /* TIMER SPECIAL */
        .currency.timer {
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            margin-left: 6px;
            padding-left: 12px;
        }

        /* ICON BASE */
        .currency-icon {
            width: 18px;
            height: 18px;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
        }

        /* 💰 GOLD */
        .currency-icon.gold {
            background-image: url("https://wow.zamimg.com/images/wow/icons/small/inv_misc_coin_02.jpg");
        }

        /* ESSENCE */
        .currency-icon.essence {
            background-image: url("https://wow.zamimg.com/images/wow/icons/large/inv_jewelcrafting_icediamond_01.jpg");
        }

        /* 💎 CRYSTALS */
        .currency-icon.crystals {
            background-image: url("https://wow.zamimg.com/images/wow/icons/large/inv_enchant_abysscrystal.jpg");
        }

        /* 🎇 Sanctified */
        .currency-icon.sanctified {
            background-image: url("https://wow.zamimg.com/images/wow/icons/large/ability_paladin_shieldofthetemplar.jpg");
        }

        /* ⏳ TIMER */
        .currency-icon.timer-icon {
            background-image: url("https://wow.zamimg.com/images/wow/icons/small/inv_misc_pocketwatch_01.jpg");
        }

        /* TOOLTIP BASE */
        .currency {
            position: relative;
        }

        /* TOOLTIP BOX */
        .currency::after {
            content: attr(data-tooltip);
            position: absolute;

            bottom: -32px;
            left: 50%;
            transform: translateX(-50%) translateY(5px);

            background: rgba(2, 6, 23, 0.95);
            color: #e2e8f0;

            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;

            white-space: nowrap;
            pointer-events: none;

            opacity: 0;
            transition: 0.2s ease;

            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);

            z-index: 300;
        }

        /* TOOLTIP ARROW */
        .currency::before {
            content: "";
            position: absolute;

            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);

            border-width: 6px;
            border-style: solid;
            border-color: rgba(2, 6, 23, 0.95) transparent transparent transparent;

            opacity: 0;
            transition: 0.2s ease;
        }

        /* SHOW ON HOVER */
        .currency:hover::after,
        .currency:hover::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 📦 FLOATING POPUP */
        .reward-popup {
            position: fixed;
            z-index: 400;
            display: none;
        }

        /* CONTENT */
        .popup-content {
            max-width: 300px;
            padding: 12px;

            background: linear-gradient(145deg, #020617, #0f172a);
            border-radius: 12px;

            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);

            opacity: 0;
            transform: translateY(-5px);
            transition: 0.15s ease;
        }

        /* SHOW */
        .reward-popup.active {
            display: block;
        }

        .reward-popup.active .popup-content {
            opacity: 1;
            transform: translateY(0);
        }

        /* HEADER */
        .popup-header {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e2e8f0;
        }

        /* BODY */
        .popup-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        /* ROW */
        .reward-row {
            display: flex;
            align-items: center;
            gap: 8px;

            padding: 6px 8px;
            border-radius: 8px;

            background: rgba(255, 255, 255, 0.03);
        }

        /* FLOATING TEXT */
        .floating-text {
            position: fixed;
            pointer-events: none;
            z-index: 999;

            font-size: 14px;
            font-weight: 600;

            color: #ffffff;
            /* gold-ish default */
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);

            opacity: 0;
            transform: translateY(10px) scale(0.95);

            animation: floatUp 1s ease-out forwards;
        }

        /* ANIMATION */
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(10px) scale(0.9);
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-30px) scale(1.05);
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="menu-item" id="chestsToggle">🧰 Chests</div>

        <div class="submenu" id="chestsMenu">
            <div class="submenu-item">Basic Chest</div>
            <div class="submenu-item">Epic Chest</div>
            <div class="submenu-item">Legendary Chest</div>
        </div>

        <div class="menu-item">🃏 Cards</div>
        <div class="menu-item">⚙️ Settings</div>
    </div>

    <div class="container deck-start">
        <div class="chest" id="chestBtn"></div>
        <div class="columns">
            <div class="col left">
                <!-- 3 cards -->
            </div>

            <div class="col center">
                <!-- 4 cards -->
            </div>

            <div class="col right">
                <!-- 3 cards -->
            </div>
        </div>
    </div>

    <div class="currency-panel">

        <div class="currency" id="goldCurrency" data-tooltip="Gold – used to purchase various chests">
            <div class="currency-icon gold"></div>
            <span class="value" id="goldValue">1250572341</span>
        </div>

        <div class="currency" id="essenceCurrency" data-tooltip="Essences – used to purchase chests with better odds">
            <div class="currency-icon essence"></div>
            <span class="value" id="essencesValue">42</span>
        </div>

        <div class="currency" id="crystalsCurrency" data-tooltip="Crystals – used to purchase chests with BEST odds">
            <div class="currency-icon crystals"></div>
            <span class="value" id="crystalsValue">18</span>
        </div>

        <div class="currency" id="sanctifiedCurrency" data-tooltip="Sanctified Emblems – used to purchase UNIQUE chests">
            <div class="currency-icon sanctified"></div>
            <span class="value" id="sanctifiedValue">18</span>
        </div>

        <div class="currency timer" data-tooltip="Collection Appraisal timer">
            <div class="currency-icon timer-icon"></div>
            <span class="value" id="timerValue">06:00:00</span>
        </div>

    </div>

    <div class="reward-popup" id="rewardPopup">
        <div class="popup-content">
            <div class="popup-header">
                Dividends
            </div>
            <div class="popup-body">
            </div>
        </div>
    </div>

    <script>
        // localStorage.clear();
        // location.reload();
        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        function updateCurrencyUI() {
            document.getElementById('goldValue').textContent = formatNumber(currencies.gold);
            document.getElementById('essencesValue').textContent = formatNumber(currencies.esseneces);
            document.getElementById('crystalsValue').textContent = formatNumber(currencies.crystals);
            document.getElementById('sanctifiedValue').textContent = formatNumber(currencies.sanctified);
        }

        function showFloatingText(targetEl, text, type) {
            const rect = targetEl.getBoundingClientRect();

            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;

            // 📍 position under the currency box
            el.style.left = (rect.left + rect.width / 2) - 6 + 'px';
            el.style.top = (rect.bottom + 5) + 'px';
            el.style.transform = 'translateX(-50%)';

            document.body.appendChild(el);

            // remove after animation
            setTimeout(() => {
                el.remove();
            }, 1000);
        }

        // STORAGE
        // STORAGE
        // STORAGE
        const defaultCurrencies = {
            gold: 0,
            esseneces: 0,
            crystals: 0,
            sanctified: 0,
        };

        const rewardTable = {
            gold: { min: 1000, max: 17899 },
            essence: { min: 2, max: 8 },
            crystals: { min: 1, max: 3 },
            sanctified: { min: 1, max: 3 }
        };

        function loadCurrencies() {
            const saved = localStorage.getItem('currencies');
            return saved ? JSON.parse(saved) : { ...defaultCurrencies };
        }

        function saveCurrencies() {
            localStorage.setItem('currencies', JSON.stringify(currencies));
        }

        let currencies = loadCurrencies();

        // GAME RULES
        // GAME RULES
        // GAME RULES

        // PERSIST REWARDS
        let currentRewards = loadRewards();

        function loadRewards() {
            const saved = localStorage.getItem('timer_rewards');
            if (saved) return JSON.parse(saved);

            const rolled = rollRewards();
            localStorage.setItem('timer_rewards', JSON.stringify(rolled));
            return rolled;
        }

        function saveRewards(rewards) {
            localStorage.setItem('timer_rewards', JSON.stringify(rewards));
        }

        // ⏳ TIMER SYSTEM (6 hours)
        const TIMER_DURATION = 1 * 1 * 3 * 1000; // 6h in ms
        const timerEl = document.getElementById('timerValue');

        // persist end time
        let endTime = loadEndTime();

        function loadEndTime() {
            const saved = localStorage.getItem('wow_timer_end');
            return saved ? parseInt(saved) : Date.now() + TIMER_DURATION;
        }

        function updateTimer() {
            const now = Date.now();

            // 🎁 HANDLE ALL MISSED REWARD CYCLES
            while (now >= endTime) {

                // give rewards
                for (let key in currentRewards) {
                    currencies[key] += currentRewards[key];

                    // 🎯 trigger floating text
                    const el = document.getElementById(`${key}Currency`);
                    if (el) {
                        showFloatingText(
                            el,
                            `+${formatNumber(currentRewards[key])}`,
                            key
                        );
                    }
                }

                // move to next cycle
                endTime += TIMER_DURATION;

                // roll new rewards
                currentRewards = rollRewards();
            }

            // 💾 SAVE STATE
            saveCurrencies();
            updateCurrencyUI();
            localStorage.setItem('wow_timer_end', endTime);
            saveRewards(currentRewards);

            // ⏳ DISPLAY TIMER
            const remaining = endTime - now;

            const hours = Math.floor(remaining / (1000 * 60 * 60));
            const minutes = Math.floor((remaining / (1000 * 60)) % 60);
            const seconds = Math.floor((remaining / 1000) % 60);

            timerEl.textContent =
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');
        }

        // update every second
        setInterval(updateTimer, 1000);
        updateTimer();


        // REWARDS
        // REWARDS
        // REWARDS
        function rollRewards() {
            const rewards = {};

            for (let key in rewardTable) {
                const { min, max } = rewardTable[key];
                rewards[key] = Math.floor(Math.random() * (max - min + 1)) + min;
            }

            return rewards;
        }


        // APPRAISAL POPUP
        function renderRewards(rewards) {
            const container = document.querySelector('.popup-body');
            container.innerHTML = '';

            Object.entries(rewards).forEach(([type, value]) => {
                const row = document.createElement('div');
                row.className = 'reward-row';

                row.innerHTML = `
                    <div class="currency-icon ${type}"></div>
                    <span>+${formatNumber(value)}</span>
                `;

                container.appendChild(row);
            });
        }

        const timerBox = document.querySelector('.currency.timer');
        const popup = document.getElementById('rewardPopup');

        timerBox.addEventListener('click', (e) => {

            // 🎁 generate fresh rewards each open (or remove this if you want fixed per cycle)
            // currentRewards = rollRewards();
            renderRewards(currentRewards);

            const rect = timerBox.getBoundingClientRect();

            popup.style.left = rect.left + 'px';
            popup.style.top = (rect.bottom + 8) + 'px';

            popup.classList.toggle('active');

            e.stopPropagation();
        });

        // close outside
        document.addEventListener('click', (e) => {
            if (!popup.contains(e.target) && !timerBox.contains(e.target)) {
                popup.classList.remove('active');
            }
        });

        updateCurrencyUI();

        const chestsToggle = document.getElementById('chestsToggle');
        const chestsMenu = document.getElementById('chestsMenu');

        chestsToggle.addEventListener('click', () => {
            chestsMenu.classList.toggle('open');
        });
        //  CARD LAYOUT
        const leftCol = document.querySelector('.left');
        const centerCol = document.querySelector('.center');
        const rightCol = document.querySelector('.right');
        function createCard(id) {
            return `
                <div class="card-wrapper flipped">
                    <div class="hover-layer-flipped">
                        <!-- 🔥 STABLE TOOLTIP ANCHOR -->
                        <a class="tooltip-anchor" href="https://wotlk.wowhead.com/item=${id}" data-wh-icon="true"
                            data-wh-icon-size="large" data-wh-rename="true">
                        </a>
                    </div>
                    <div class="card-inner">
                        <div class="card-anim">
                            <!-- FRONT -->
                            <a class="card front" href="https://wotlk.wowhead.com/item=${id}" data-wh-icon="true"
                                data-wh-icon-size="large" data-wh-rename="true">
                            </a>

                            <!-- BACK -->
                            <div class="card back">
                                <div class="logo"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ITEM COLLECTIONS
        // ITEM COLLECTIONS
        // ITEM COLLECTIONS
        const allitems = [10000, 10001, 10002, 10003, 10004, 10005, 10007, 10008, 10009, 10010, 10011, 10018, 10019, 10020, 10021, 10022, 10023, 10024, 10025, 10026, 10027, 10028, 10029, 10030];
        const itemsLength = allitems.length;

        const leftItems = [42984, 50048, allitems[Math.floor(Math.random() * itemsLength)]];
        const centerItems = [22589, allitems[Math.floor(Math.random() * itemsLength)], allitems[Math.floor(Math.random() * itemsLength)], allitems[Math.floor(Math.random() * itemsLength)]];
        const rightItems = [allitems[Math.floor(Math.random() * itemsLength)], allitems[Math.floor(Math.random() * itemsLength)], allitems[Math.floor(Math.random() * itemsLength)]];

        leftCol.innerHTML = leftItems.map(createCard).join('');
        centerCol.innerHTML = centerItems.map(createCard).join('');
        rightCol.innerHTML = rightItems.map(createCard).join('');


        // SETUP CHEST
        const chest = document.getElementById('chestBtn');

        chest.addEventListener('click', () => {

            if (chest.classList.contains('opened')) return;
            chest.classList.add('opened');

            // little click feedback
            chest.style.transform = 'translate(-50%, -50%) scale(0.9)';

            setTimeout(() => {
                chest.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 150);

            // 🎴 DEAL
            spreadFromCenter();

            // hide chest after
            setTimeout(() => {
                chest.style.opacity = 0;
                chest.style.pointerEvents = 'none';
            }, 300);
        });

        // setTimeout(spreadFromCenter, 100);
        // if (window.whTooltips) {
        //     window.whTooltips.refreshLinks?.();
        // }


        // disable click (keep tooltip) - LINK DISABLER
        document.querySelectorAll('.card').forEach(el => {
            el.addEventListener('click', e => e.preventDefault());
        });
        document.querySelectorAll('.tooltip-anchor').forEach(el => {
            el.addEventListener('click', e => e.preventDefault());
        });

        // CARDS LOGIC
        // CARDS LOGIC
        // CARDS LOGIC
        const container = document.querySelector('.container');
        const wrappers = document.querySelectorAll('.card-wrapper');

        // CARD FLIP LOGIC
        wrappers.forEach(wrapper => {
            const inner = wrapper.querySelector('.card-inner');

            wrapper.addEventListener('click', () => {

                // 🔥 If already revealed → ignore
                if (!wrapper.classList.contains('flipped')) return;

                // 💥 If already revealing → SKIP animation
                if (wrapper.classList.contains('revealing')) {

                    clearTimeout(wrapper._revealTimeout);

                    const inner = wrapper.querySelector('.card-inner');

                    // clean state
                    inner.style.transform = 'none';
                    inner.offsetHeight;

                    wrapper.classList.remove('flipped');
                    wrapper.classList.remove('pre-epic', 'pre-legendary', 'pre-heirloom');
                    wrapper.classList.remove('revealing');

                    return;
                }

                // 🧠 NORMAL FLOW
                wrapper.classList.add('revealing');

                const inner = wrapper.querySelector('.card-inner');
                const front = wrapper.querySelector('.front');

                let rarity = null;
                if (front.classList.contains('q4')) rarity = 'epic';
                if (front.classList.contains('q5')) rarity = 'legendary';
                if (front.classList.contains('q7')) rarity = 'heirloom';

                let delay = 0;

                if (rarity) {
                    wrapper.classList.add(`pre-${rarity}`);

                    delay = 600;
                    if (rarity === 'legendary') delay = 1200;
                    if (rarity === 'heirloom') delay = 900;
                }

                // 🔥 store timeout so we can cancel it
                wrapper._revealTimeout = setTimeout(() => {

                    inner.style.transform = 'none';
                    inner.offsetHeight;

                    wrapper.classList.remove('flipped');
                    wrapper.classList.remove(`pre-${rarity}`);
                    wrapper.classList.remove('revealing');

                }, delay);
            });
        });

        // TOOLTIP POSITIONING
        wrappers.forEach(wrapper => {

            wrapper.addEventListener('mouseenter', () => {
                const rect = wrapper.getBoundingClientRect();

                const x = rect.right + 30;
                const y = rect.top + rect.height / 2;

                document.documentElement.style.setProperty('--tooltip-x', x + 'px');
                document.documentElement.style.setProperty('--tooltip-y', y + 'px');
            });

        });

        // CARD TILT ANIMATION
        wrappers.forEach(wrapper => {
            const inner = wrapper.querySelector('.card-inner');

            wrapper.addEventListener('mouseenter', () => {
                if (wrapper.classList.contains('revealing')) return;

                isHovering = true;
            });

            wrapper.addEventListener('mousemove', (e) => {
                if (wrapper.classList.contains('revealing')) return;

                updateTilt(wrapper, inner, e);
            });

            wrapper.addEventListener('mouseleave', () => {
                inner.style.transform = '';
            });
        });

        function updateTilt(wrapper, inner, e = null) {
            const rect = wrapper.getBoundingClientRect();

            let x = rect.width / 2;
            let y = rect.height / 2;

            if (e) {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            const midX = rect.width / 2;
            const midY = rect.height / 2;

            const rotateY = ((x - midX) / midX) * -15;
            const rotateX = -((y - midY) / midY) * -15;

            const flipped = wrapper.classList.contains('flipped');

            inner.style.transform = `
                rotateX(${rotateX}deg)
                rotateY(${rotateY + (flipped ? 180 : 0)}deg)
                scale(1.05)
            `;
        }

        // CARD SPREAD ANIMATION
        function spreadFromCenter() {
            const cards = [...document.querySelectorAll('.card-wrapper')];

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // STEP 1: remove deck-start so layout becomes real
            container.classList.remove('deck-start');

            // STEP 2: wait for layout
            requestAnimationFrame(() => {

                // STEP 3: measure final positions
                const positions = cards.map(card => {
                    const rect = card.getBoundingClientRect();
                    return {
                        card,
                        x: rect.left + rect.width / 2,
                        y: rect.top + rect.height / 2
                    };
                });

                // STEP 4: move them BACK to center (instantly)
                positions.forEach(({ card, x, y }) => {
                    const offsetX = centerX - x;
                    const offsetY = centerY - y;

                    card.style.transition = 'none';
                    card.style.setProperty('--tx', `${offsetX}px`);
                    card.style.setProperty('--ty', `${offsetY}px`);
                    card.style.setProperty('--scale', `0.9`);
                    card.style.opacity = 0;
                });

                // FORCE reflow
                document.body.offsetHeight;

                // STEP 5: animate out
                positions.forEach(({ card }, i) => {
                    setTimeout(() => {
                        card.style.transition =
                            'transform 0.7s cubic-bezier(.2,.8,.2,1), opacity 0.4s ease';

                        card.style.setProperty('--tx', `0px`);
                        card.style.setProperty('--ty', `0px`);
                        card.style.setProperty('--scale', `1`);
                        card.style.opacity = 1;

                    }, i * 60);
                });

            });
        }
    </script>

</body>
